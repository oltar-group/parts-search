<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Parts Search</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="search-panel" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Supplier search</p>
          <h1 id="page-title">Parts Search</h1>
        </div>

        <form id="search-form" class="search-form">
          <label>
            <span>Article</span>
            <input
              id="article"
              name="q"
              type="search"
              autocomplete="off"
              placeholder="OC90"
              required
            />
          </label>

          <label>
            <span>Brand</span>
            <input
              id="brand"
              name="brand"
              type="search"
              autocomplete="off"
              placeholder="MAHLE"
            />
          </label>

          <button type="submit" id="search-button">Search</button>
        </form>
      </section>

      <section class="status-row" aria-live="polite">
        <div id="status" class="status">Enter an article number to start.</div>
      </section>

      <section id="provider-errors" class="provider-errors" hidden></section>
      <section id="results" class="results" aria-label="Search results"></section>
    </main>

    <template id="result-template">
      <article class="result-card">
        <div class="image-wrap"></div>
        <div class="result-body">
          <div class="result-head">
            <div>
              <p class="provider"></p>
              <h2 class="title"></h2>
            </div>
            <p class="price"></p>
          </div>
          <dl class="details"></dl>
        </div>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
