<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Parts Search</title>
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Parts" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="search-panel" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Supplier search</p>
          <h1 id="page-title">Parts Search</h1>
        </div>

        <form id="search-form" class="search-form">
          <label>
            <span>Article</span>
            <input
              id="article"
              name="q"
              type="search"
              autocomplete="off"
              required
            />
          </label>

          <label>
            <span>Brand</span>
            <input
              id="brand"
              name="brand"
              type="search"
              autocomplete="off"
            />
          </label>

          <button type="submit" id="search-button">Search</button>
        </form>
      </section>

      <section class="status-row" aria-live="polite">
        <div id="status" class="status">Enter an article number to start.</div>
        <div id="sort-control" class="sort-control" hidden>
          <span>Sort</span>
          <div class="sort-segment" role="group" aria-label="Sort results by price">
            <button
              type="button"
              class="sort-option"
              data-sort="price-asc"
              aria-label="Sort by price ascending"
              title="Price ascending"
            >
              Price ↑
            </button>
            <button
              type="button"
              class="sort-option"
              data-sort="price-desc"
              aria-label="Sort by price descending"
              title="Price descending"
            >
              Price ↓
            </button>
          </div>
        </div>
      </section>

      <section id="provider-errors" class="provider-errors" hidden></section>
      <section id="results" class="results" aria-label="Search results"></section>
      <footer class="footer-info">
        <span id="build-info" aria-label="Build version"></span>
        <span id="search-stats" aria-label="Search statistics" hidden></span>
      </footer>
    </main>

    <template id="result-template">
      <article class="result-card">
        <button class="image-wrap" type="button" aria-label="Open part image"></button>
        <div class="result-body">
          <div class="result-head">
            <div>
              <p class="provider"></p>
              <h2 class="title"></h2>
            </div>
            <p class="price"></p>
          </div>
          <dl class="details"></dl>
        </div>
      </article>
    </template>

    <dialog id="image-dialog" class="image-dialog" aria-label="Part image preview">
      <button class="dialog-close" type="button" aria-label="Close image preview">Close</button>
      <img id="dialog-image" alt="" />
    </dialog>

    <script src="/app.js" type="module"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
